name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Use Node.js 18.x
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm ci
      
    # Since we don't have dedicated unit test files in this demo,
    # we'll just ensure the project builds/installs cleanly.
    # In a real app, you would run: npm test
      
    - name: Build Docker Image
      run: docker build -t code-quality-analyzer:latest .
      
    - name: Log Successful Build
      run: echo "🚀 Docker image built successfully and ready for deployment!"
